<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Dashboard</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header>
      <h1>Dashboard</h1>
      <button id="theme-toggle" aria-label="Toggle theme">Toggle Theme</button>
    </header>

    <main>
      <section id="greeting" aria-label="Greeting widget"></section>
      <section id="timer" aria-label="Focus timer widget"></section>
      <section id="todo" aria-label="To-do list widget"></section>
      <section id="links" aria-label="Quick links widget"></section>
    </main>

    <footer>
      <p>Personal Dashboard</p>
    </footer>

    <script src="js/app.js"></script>
  </body> 
</html>
